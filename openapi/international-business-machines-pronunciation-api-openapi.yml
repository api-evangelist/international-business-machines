openapi: 3.0.3
info:
  title: International Business Machines IBM Cloud Object Storage Analyze Pronunciation API
  description: The IBM Cloud Object Storage API provides a RESTful interface compatible with S3 for storing and retrieving objects in buckets. It supports features such as multipart uploads, versioning, lifecycle policies, and server-side encryption.
  version: 1.0.0
  contact:
    name: IBM Cloud
    url: https://cloud.ibm.com/docs/cloud-object-storage
  license:
    name: IBM Cloud Terms
    url: https://www.ibm.com/terms
servers:
- url: https://s3.us-south.cloud-object-storage.appdomain.cloud
  description: US South
- url: https://s3.eu-de.cloud-object-storage.appdomain.cloud
  description: EU Germany
- url: https://s3.eu-gb.cloud-object-storage.appdomain.cloud
  description: EU Great Britain
security:
- bearerAuth: []
tags:
- name: Pronunciation
  description: Get word pronunciations.
paths:
  /v1/pronunciation:
    get:
      operationId: getPronunciation
      summary: International Business Machines Get pronunciation
      description: Get the phonetic pronunciation of a word.
      tags:
      - Pronunciation
      parameters:
      - name: text
        in: query
        required: true
        schema:
          type: string
      - name: voice
        in: query
        schema:
          type: string
      - name: format
        in: query
        schema:
          type: string
          enum:
          - ipa
          - ibm
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  pronunciation:
                    type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: IAM Token
