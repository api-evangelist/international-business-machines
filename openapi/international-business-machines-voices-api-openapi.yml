openapi: 3.0.3
info:
  title: International Business Machines IBM Cloud Object Storage Analyze Voices API
  description: The IBM Cloud Object Storage API provides a RESTful interface compatible with S3 for storing and retrieving objects in buckets. It supports features such as multipart uploads, versioning, lifecycle policies, and server-side encryption.
  version: 1.0.0
  contact:
    name: IBM Cloud
    url: https://cloud.ibm.com/docs/cloud-object-storage
  license:
    name: IBM Cloud Terms
    url: https://www.ibm.com/terms
servers:
- url: https://s3.us-south.cloud-object-storage.appdomain.cloud
  description: US South
- url: https://s3.eu-de.cloud-object-storage.appdomain.cloud
  description: EU Germany
- url: https://s3.eu-gb.cloud-object-storage.appdomain.cloud
  description: EU Great Britain
security:
- bearerAuth: []
tags:
- name: Voices
  description: Manage available voices.
paths:
  /v1/voices:
    get:
      operationId: listVoices
      summary: International Business Machines List voices
      description: List all available voices.
      tags:
      - Voices
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  voices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Voice'
  /v1/voices/{voice}:
    get:
      operationId: getVoice
      summary: International Business Machines Get a voice
      description: Get information about a specific voice.
      tags:
      - Voices
      parameters:
      - name: voice
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voice'
components:
  schemas:
    Voice:
      type: object
      properties:
        name:
          type: string
        language:
          type: string
        gender:
          type: string
        description:
          type: string
        url:
          type: string
        customizable:
          type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: IAM Token
