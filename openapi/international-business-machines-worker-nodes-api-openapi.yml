openapi: 3.0.3
info:
  title: International Business Machines IBM Cloud Object Storage Analyze Worker Nodes API
  description: The IBM Cloud Object Storage API provides a RESTful interface compatible with S3 for storing and retrieving objects in buckets. It supports features such as multipart uploads, versioning, lifecycle policies, and server-side encryption.
  version: 1.0.0
  contact:
    name: IBM Cloud
    url: https://cloud.ibm.com/docs/cloud-object-storage
  license:
    name: IBM Cloud Terms
    url: https://www.ibm.com/terms
servers:
- url: https://s3.us-south.cloud-object-storage.appdomain.cloud
  description: US South
- url: https://s3.eu-de.cloud-object-storage.appdomain.cloud
  description: EU Germany
- url: https://s3.eu-gb.cloud-object-storage.appdomain.cloud
  description: EU Great Britain
security:
- bearerAuth: []
tags:
- name: Worker Nodes
  description: Manage worker nodes.
paths:
  /v2/getWorkers:
    get:
      operationId: getWorkers
      summary: International Business Machines List worker nodes
      description: List all worker nodes in a cluster.
      tags:
      - Worker Nodes
      parameters:
      - name: cluster
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Worker'
components:
  schemas:
    Worker:
      type: object
      properties:
        id:
          type: string
        state:
          type: string
        status:
          type: string
        privateIP:
          type: string
        publicIP:
          type: string
        machineType:
          type: string
        kubeVersion:
          type: string
        poolID:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: IAM Token
