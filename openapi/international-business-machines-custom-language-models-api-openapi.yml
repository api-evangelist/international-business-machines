openapi: 3.0.3
info:
  title: International Business Machines IBM Cloud Object Storage Analyze Custom Language Models API
  description: The IBM Cloud Object Storage API provides a RESTful interface compatible with S3 for storing and retrieving objects in buckets. It supports features such as multipart uploads, versioning, lifecycle policies, and server-side encryption.
  version: 1.0.0
  contact:
    name: IBM Cloud
    url: https://cloud.ibm.com/docs/cloud-object-storage
  license:
    name: IBM Cloud Terms
    url: https://www.ibm.com/terms
servers:
- url: https://s3.us-south.cloud-object-storage.appdomain.cloud
  description: US South
- url: https://s3.eu-de.cloud-object-storage.appdomain.cloud
  description: EU Germany
- url: https://s3.eu-gb.cloud-object-storage.appdomain.cloud
  description: EU Great Britain
security:
- bearerAuth: []
tags:
- name: Custom Language Models
  description: Create and manage custom language models.
paths:
  /v1/customizations:
    get:
      operationId: listLanguageModels
      summary: International Business Machines List custom language models
      description: List all custom language models.
      tags:
      - Custom Language Models
      responses:
        '200':
          description: Successful response
    post:
      operationId: createLanguageModel
      summary: International Business Machines Create a custom language model
      description: Create a new custom language model for a specified base model.
      tags:
      - Custom Language Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - base_model_name
              properties:
                name:
                  type: string
                base_model_name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Custom model created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: IAM Token
