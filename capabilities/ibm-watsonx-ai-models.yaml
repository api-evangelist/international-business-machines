naftiko: 1.0.0-alpha2
info:
  label: International Business Machines IBM watsonx.ai API — Models
  description: 'International Business Machines IBM watsonx.ai API — Models. 1 operations. Lead operation: International Business
    Machines List foundation models. Self-contained Naftiko capability covering one International Business Machines business
    surface.'
  tags:
  - International Business Machines
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERNATIONAL_BUSINESS_MACHINES_API_KEY: INTERNATIONAL_BUSINESS_MACHINES_API_KEY
capability:
  consumes:
  - type: http
    namespace: ibm-watsonx-ai-models
    baseUri: https://us-south.ml.cloud.ibm.com
    description: International Business Machines IBM watsonx.ai API — Models business capability. Self-contained, no shared
      references.
    resources:
    - name: ml-v1-foundation_model_specs
      path: /ml/v1/foundation_model_specs
      operations:
      - name: listfoundationmodels
        method: GET
        description: International Business Machines List foundation models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: version
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.INTERNATIONAL_BUSINESS_MACHINES_API_KEY}}'
  exposes:
  - type: rest
    namespace: ibm-watsonx-ai-models-rest
    port: 8080
    description: REST adapter for International Business Machines IBM watsonx.ai API — Models. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/ml/v1/foundation-model-specs
      name: ml-v1-foundation-model-specs
      description: REST surface for ml-v1-foundation_model_specs.
      operations:
      - method: GET
        name: listfoundationmodels
        description: International Business Machines List foundation models
        call: ibm-watsonx-ai-models.listfoundationmodels
        with:
          version: rest.version
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ibm-watsonx-ai-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for International Business Machines IBM watsonx.ai API — Models. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: international-business-machines-list-foundation
      description: International Business Machines List foundation models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ibm-watsonx-ai-models.listfoundationmodels
      with:
        version: tools.version
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
