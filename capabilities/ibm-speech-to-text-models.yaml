naftiko: 1.0.0-alpha2
info:
  label: International Business Machines IBM Speech to Text API — Models
  description: 'International Business Machines IBM Speech to Text API — Models. 2 operations. Lead operation: International
    Business Machines List models. Self-contained Naftiko capability covering one International Business Machines business
    surface.'
  tags:
  - International Business Machines
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERNATIONAL_BUSINESS_MACHINES_API_KEY: INTERNATIONAL_BUSINESS_MACHINES_API_KEY
capability:
  consumes:
  - type: http
    namespace: ibm-speech-to-text-models
    baseUri: https://api.us-south.speech-to-text.watson.cloud.ibm.com
    description: International Business Machines IBM Speech to Text API — Models business capability. Self-contained, no shared
      references.
    resources:
    - name: v1-models
      path: /v1/models
      operations:
      - name: listmodels
        method: GET
        description: International Business Machines List models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-models-model_id
      path: /v1/models/{model_id}
      operations:
      - name: getmodel
        method: GET
        description: International Business Machines Get a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: model_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.INTERNATIONAL_BUSINESS_MACHINES_API_KEY}}'
  exposes:
  - type: rest
    namespace: ibm-speech-to-text-models-rest
    port: 8080
    description: REST adapter for International Business Machines IBM Speech to Text API — Models. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/models
      name: v1-models
      description: REST surface for v1-models.
      operations:
      - method: GET
        name: listmodels
        description: International Business Machines List models
        call: ibm-speech-to-text-models.listmodels
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/models/{model-id}
      name: v1-models-model-id
      description: REST surface for v1-models-model_id.
      operations:
      - method: GET
        name: getmodel
        description: International Business Machines Get a model
        call: ibm-speech-to-text-models.getmodel
        with:
          model_id: rest.model_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ibm-speech-to-text-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for International Business Machines IBM Speech to Text API — Models. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: international-business-machines-list-models
      description: International Business Machines List models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ibm-speech-to-text-models.listmodels
      outputParameters:
      - type: object
        mapping: $.
    - name: international-business-machines-get-model
      description: International Business Machines Get a model
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ibm-speech-to-text-models.getmodel
      with:
        model_id: tools.model_id
      outputParameters:
      - type: object
        mapping: $.
