  - type: http
    namespace: ibm-vpc-vpcs
    baseUri: https://us-south.iaas.cloud.ibm.com
    description: International Business Machines IBM Cloud VPC API — VPCs business capability. Self-contained, no shared references.
    resources:
    - name: v1-vpcs
      path: /v1/vpcs
      operations:
      - name: listvpcs
        method: GET
        description: International Business Machines List VPCs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: version
          in: query
          type: string
          required: true
        - name: generation
          in: query
          type: integer
          required: true
      - name: createvpc
        method: POST
        description: International Business Machines Create a VPC
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: version
          in: query
          type: string
          required: true
        - name: generation
          in: query
          type: integer
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
