naftiko: 1.0.0-alpha2
info:
  label: International Business Machines IBM Cloud VPC API — VPCs
  description: 'International Business Machines IBM Cloud VPC API — VPCs. 2 operations. Lead operation: International Business
    Machines List VPCs. Self-contained Naftiko capability covering one International Business Machines business surface.'
  tags:
  - International Business Machines
  - VPCs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERNATIONAL_BUSINESS_MACHINES_API_KEY: INTERNATIONAL_BUSINESS_MACHINES_API_KEY
capability:
